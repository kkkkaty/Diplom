task: kneadings_pendulums  # код понимает, какую модель использовать

# режим задания начальной точки:
# manual - брать из блока inits
# separatrix - строить автоматически с неустойчивой сепаратрисы
init_mode: separatrix

# начальные условия (оставляем для ручного режима)
inits:
  fi1: 1.9044149804862014
  v1: 1e-6
  fi2: 1.4721305818718418
  v2: 0

# настройки автоматического старта с сепаратрисы
separatrix_init:
  # какой седло-фокус брать из симметричной пары
  # рекомендуемое правило: брать тот, у которого phi1 < phi2
  saddle_focus_rule: phi1_lt_phi2

  # как выбрать одну ветвь 1D неустойчивого многообразия
  # берём ту ветвь, у которой первая точка после равновесия имеет phi1 > phi1_eq
  branch_rule: phi1_above_eq

  # какую точку выбранной ветви брать как стартовую:
  # 1 = первая точка ветви, отличная от равновесия
  offset_index: 1

  # параметры, при которых искать седло-фокус и строить сепаратрису
  # пока ставим те же, что и в defaultSystem
  base_params:
    gamma: 0.97
    lambda: 0.2
    k: 0.06

# параметры системы
defaultSystem:
  gamma: 0.97  # постоянное внешнее воздействие
  lambda: 0.2   # коэфф. затухания
  k: 0.06     # коэфф. связи между маятниками

# описание двумерной сетки параметров
grid:
  # варьируем параметр gamma: 300 шагов влево, 300 шагов вправо, шаг 0.01
  first:
    name: gamma
    caption: gamma
    left_n: 200
    right_n: 200
    left_step: 0.001
    right_step: 0.001

  # варьируем параметр k
  second:
    name: k
    caption: k
    down_n: 40
    up_n: 200
    down_step: 0.001
    up_step: 0.001

# численно интегрируется система
kneadings_pendulums:
  dt: 0.01
  n: 50000
  stride: 1
  kneadings_start: 0
  kneadings_end: 16

misc:
  # сопоставляет названия параметров с индексами в массивах данных
  param_to_index:
    gamma: 0
    lambda: 1
    k: 2

  # временно: чтобы код не падал, пока не переделаем init-стадию
  init_res: ignore
  start_eq: [0.0, 0.0, 0.0, 0.0]

  # размер текста на картинке
  plot_params:
    font_size: 14

output:
  directory: "C:/Lobach4/tu/kneadings-master1/output"
  mask: "kneadings_pendulums1"
  imageExtension: png
  useTimestamp: true
  overwrite: false
  makeSubdir: false